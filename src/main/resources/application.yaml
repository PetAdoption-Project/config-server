server:
  port: 8888

eureka:
  instance:
    metadata-map:
      management.port: ${management.server.port:${server.port}}

spring:
  application:
    name: config-server
  profiles:
    active: composite
  cloud:
    config:
      server:
        composite:
          - type: git
            uri: ${CONFIG_REPO_URI}
            search-paths: config
            default-label: ${CONFIG_REPO_BRANCH:main}
          - type: vault
            host: ${VAULT_HOST:localhost}
            port: 8200
            scheme: http
            authentication: TOKEN
            token: ${VAULT_TOKEN}
            kv-version: 2
            backend: secret
            default-key: petadoption/services
